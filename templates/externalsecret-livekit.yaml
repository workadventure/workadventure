{{- if and .Values.livekitExternalSecret.enabled (index .Values.workadventure "livekit" "enabled") -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-livekit-credentials
  labels:
    app.kubernetes.io/name: livekit-credentials
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: {{ .Values.livekitExternalSecret.secretStoreRef.name }}
    kind: {{ .Values.livekitExternalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Release.Name }}-livekit-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        LIVEKIT_API_KEY: "{{ `{{ .apiKey }}` }}"
        LIVEKIT_API_SECRET: "{{ `{{ .apiSecret }}` }}"
        keys.yaml: "{{ `{{ .apiKey }}: {{ .apiSecret }}` }}"
  data:
    - secretKey: apiKey
      remoteRef:
        key: {{ .Values.livekitExternalSecret.secretsManagerKey | quote }}
        property: apiKey
    - secretKey: apiSecret
      remoteRef:
        key: {{ .Values.livekitExternalSecret.secretsManagerKey | quote }}
        property: apiSecret
{{- end }}
