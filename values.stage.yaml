nlb:
  eipAllocations: []  # populate with stage EIP allocation id(s)

livekitExternalSecret:
  secretsManagerKey: workadventure/stage/livekit

workadventure:
  domainName: workadventure.internal.stage.celebrate.company

  commonEnv:
    # Force every conversation through the LiveKit SFU instead of the
    # simple-peer P2P mesh (which ships with no STUN/TURN configured).
    MAX_USERS_FOR_WEBRTC: "1"

  livekit-server:
    livekit:
      rtc:
        node_ip: ""  # set to stage EIP public IP
