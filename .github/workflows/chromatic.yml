name: "Chromatic (Storybook visual regression)"

# Publishes the play Storybook to Chromatic and diffs it against the baseline.
# TurboSnap (onlyChanged) keeps the snapshot budget small, so this stays cheap even
# as the design system grows.
#
# It does nothing until BOTH of these are configured on the repository:
#   - secret   CHROMATIC_PROJECT_TOKEN  (Chromatic project settings -> Manage -> Configure)
#   - variable ENABLE_CHROMATIC = "true"
# Until then the job is skipped, so it never blocks CI.

on:
    pull_request:
        paths:
            - "play/**"
            - ".github/workflows/chromatic.yml"

jobs:
    chromatic:
        name: "Run Chromatic"
        if: ${{ vars.ENABLE_CHROMATIC == 'true' }}
        runs-on: "ubuntu-latest"
        steps:
            - name: "Checkout"
              uses: "actions/checkout@v5"
              with:
                  # Chromatic needs full history to establish the visual baseline.
                  fetch-depth: 0

            - name: "Setup NodeJS"
              uses: actions/setup-node@v3
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install Protoc
              uses: arduino/setup-protoc@v3
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  version: '3.x'

            - name: "Install dependencies"
              run: npm ci --workspace=workadventure-play

            - name: "Install messages dependencies"
              run: npm ci
              working-directory: "messages"

            - name: "Build proto messages"
              run: npm run ts-proto
              working-directory: "messages"

            - name: "Generate i18n files"
              run: npm run typesafe-i18n
              working-directory: "play"

            - name: "Publish to Chromatic"
              uses: chromaui/action@latest
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
                  workingDir: "play"
                  buildScriptName: "build-storybook"
                  # Only snapshot stories affected by the change, and don't fail the PR on
                  # visual diffs — they are reviewed and accepted in the Chromatic UI.
                  onlyChanged: true
                  exitZeroOnChanges: true
