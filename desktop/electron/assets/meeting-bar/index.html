<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>WorkAdventure meeting bar</title>
    <style>
        :root {
            color-scheme: dark;
            --fg: #f8fafc;
            --fg-muted: #94a3b8;
            --contrast: rgba(27, 42, 65, 0.92);
            --secondary: #4156F6;
            --secondary-hover: #5566ff;
            --danger: #E96D51;
            --danger-hover: #ef7e63;
        }
        html, body {
            margin: 0;
            height: 100%;
            background: transparent;
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        body { display: flex; flex-direction: column; }

        /* Source picker panel, revealed above the pill when the window is expanded. */
        #picker {
            flex: 1;
            min-height: 0;
            display: none;
            flex-direction: column;
            margin: 0 4px 8px;
            border-radius: 12px;
            background: var(--contrast);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        }
        #picker.visible { display: flex; }
        #picker .pk-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        #picker .pk-title { font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }
        #picker .pk-tabs { display: flex; gap: 4px; }
        #picker .pk-tab {
            background: rgba(255, 255, 255, 0.06);
            border: 0;
            color: var(--fg);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 999px;
            cursor: pointer;
        }
        #picker .pk-tab.active { background: var(--secondary); }
        #picker .pk-tab:hover:not(.active) { background: rgba(255, 255, 255, 0.12); }
        #picker .pk-close {
            background: rgba(255, 255, 255, 0.06);
            border: 0;
            color: var(--fg);
            font-size: 14px;
            padding: 3px 9px;
            border-radius: 4px;
            cursor: pointer;
            line-height: 1;
        }
        #picker .pk-close:hover { background: rgba(255, 255, 255, 0.16); }
        #picker .pk-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            align-content: start;
        }
        #picker .pk-body.empty,
        #picker .pk-body.loading {
            display: grid;
            place-items: center;
            grid-template-columns: 1fr;
            color: var(--fg-muted);
            font-size: 12px;
        }
        #picker .pk-tile {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            padding: 0;
            text-align: left;
        }
        #picker .pk-tile:hover {
            background: rgba(65, 86, 246, 0.18);
            border-color: rgba(65, 86, 246, 0.55);
        }
        #picker .pk-tile img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #000;
            display: block;
        }
        #picker .pk-tile .pk-tile-name {
            font-size: 11px;
            padding: 4px 6px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--fg);
        }
        #picker .pk-note {
            grid-column: 1 / -1;
            color: var(--fg-muted);
            font-size: 11px;
            text-align: center;
            padding: 6px;
        }

        /* The meeting pill itself. Draggable (app-region), buttons opt out. */
        #bar {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            padding: 4px 4px 8px;
        }
        .pill {
            -webkit-app-region: drag;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: var(--contrast);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 5px 8px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        }
        .bar-btn {
            -webkit-app-region: no-drag;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: var(--fg);
            padding: 0;
            transition: background-color 80ms ease;
        }
        .bar-btn:hover { background: rgba(255, 255, 255, 0.10); }
        .bar-btn.is-forbidden { background: var(--danger); }
        .bar-btn.is-forbidden:hover { background: var(--danger-hover); }
        .bar-btn.is-active { background: var(--secondary); }
        .bar-btn.is-active:hover { background: var(--secondary-hover); }
        .bar-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: transparent;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .bar-sep {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.18);
            margin: 0 4px;
            -webkit-app-region: no-drag;
        }
        .icon-only-on, .icon-only-off { display: none; }
        .bar-btn[data-state="on"] .icon-only-on { display: inline; }
        .bar-btn[data-state="off"] .icon-only-off { display: inline; }
    </style>
</head>
<body>
    <div id="picker" role="dialog" aria-label="Switch the shared screen">
        <div class="pk-header">
            <span class="pk-title">Switch what you share</span>
            <div class="pk-tabs">
                <button class="pk-tab active" type="button" data-kind="screen">Screens</button>
                <button class="pk-tab" type="button" data-kind="window">Windows</button>
            </div>
            <button class="pk-close" id="pk-cancel" type="button" aria-label="Cancel">×</button>
        </div>
        <div class="pk-body loading" id="pk-body">Loading sources…</div>
    </div>
    <div id="bar">
        <div class="pill">
            <button class="bar-btn" id="bar-mic" type="button" data-state="on" title="Toggle microphone" aria-label="Toggle microphone">
                <svg class="icon-only-on" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M9 2m0 3a3 3 0 0 1 3 -3h0a3 3 0 0 1 3 3v5a3 3 0 0 1 -3 3h0a3 3 0 0 1 -3 -3z"/>
                    <path d="M5 10a7 7 0 0 0 14 0"/>
                    <path d="M8 21l8 0"/>
                    <path d="M12 17l0 4"/>
                </svg>
                <svg class="icon-only-off" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 3l18 18"/>
                    <path d="M9 5a3 3 0 0 1 6 0v5a3 3 0 0 1 -.13 .874m-2 2a3 3 0 0 1 -3.87 -2.872v-1"/>
                    <path d="M5 10a7 7 0 0 0 10.846 5.85m2 -2a6.967 6.967 0 0 0 1.152 -3.85"/>
                    <path d="M8 21l8 0"/>
                    <path d="M12 17l0 4"/>
                </svg>
            </button>
            <button class="bar-btn" id="bar-cam" type="button" data-state="on" title="Toggle camera" aria-label="Toggle camera">
                <svg class="icon-only-on" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M15 10l4.553 -2.276a1 1 0 0 1 1.447 .894v6.764a1 1 0 0 1 -1.447 .894l-4.553 -2.276v-4z"/>
                    <path d="M3 6m0 2a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2z"/>
                </svg>
                <svg class="icon-only-off" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 3l18 18"/>
                    <path d="M15 11v-1l4.553 -2.276a1 1 0 0 1 1.447 .894v6.764a1 1 0 0 1 -.675 .946"/>
                    <path d="M10 6h3a2 2 0 0 1 2 2v3m0 4v1a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2v-8a2 2 0 0 1 2 -2h1"/>
                </svg>
            </button>
            <div class="bar-sep"></div>
            <button class="bar-btn" id="bar-switch" type="button" title="Switch screen or window" aria-label="Switch screen or window">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 5m0 1a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1z"/>
                    <path d="M7 20h10"/>
                    <path d="M9 16v4"/>
                    <path d="M15 16v4"/>
                    <path d="M9 11l3 -3l3 3"/>
                </svg>
            </button>
            <button class="bar-btn is-forbidden" id="bar-stop" type="button" title="Stop sharing" aria-label="Stop sharing">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 3l18 18"/>
                    <path d="M21 12v3a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1v-10a1 1 0 0 1 1 -1h9"/>
                    <path d="M7 20l10 0"/>
                    <path d="M9 16l0 4"/>
                    <path d="M15 16l0 4"/>
                </svg>
            </button>
            <div class="bar-sep"></div>
            <button class="bar-btn" id="bar-annotate" type="button" data-state="off" title="Annotate the shared screen" aria-label="Annotate the shared screen">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"/>
                    <path d="M13.5 6.5l4 4"/>
                </svg>
            </button>
            <button class="bar-btn" id="bar-eye" type="button" data-state="on" title="Hide annotations for me only (others keep drawing)" aria-label="Hide annotations locally">
                <!-- Eye open: annotations visible. -->
                <svg class="icon-only-on" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"/>
                    <path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6"/>
                </svg>
                <!-- Eye off: annotations hidden locally. -->
                <svg class="icon-only-off" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M10.585 10.587a2 2 0 0 0 2.829 2.828"/>
                    <path d="M16.681 16.673a8.717 8.717 0 0 1 -4.681 1.327c-3.6 0 -6.6 -2 -9 -6c1.272 -2.12 2.712 -3.678 4.32 -4.674m2.86 -1.146a9.055 9.055 0 0 1 1.82 -.18c3.6 0 6.6 2 9 6c-.666 1.11 -1.379 2.067 -2.138 2.87"/>
                    <path d="M3 3l18 18"/>
                </svg>
            </button>
            <div class="bar-sep"></div>
            <button class="bar-btn" id="bar-laser" type="button" data-state="off" title="Laser pointer" aria-label="Laser pointer">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/>
                    <path d="M12 12m-5 0a5 5 0 1 0 10 0a5 5 0 1 0 -10 0"/>
                    <path d="M12 3l0 2"/>
                    <path d="M3 12l2 0"/>
                    <path d="M12 19l0 2"/>
                    <path d="M19 12l2 0"/>
                </svg>
            </button>
            <button class="bar-btn" id="bar-spotlight" type="button" data-state="off" title="Spotlight" aria-label="Spotlight">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 12h1m8 -9v1m8 8h1m-15.4 -6.4l.7 .7m12.1 -.7l-.7 .7"/>
                    <path d="M9 16a5 5 0 1 1 6 0a3.5 3.5 0 0 0 -1 3a2 2 0 0 1 -4 0a3.5 3.5 0 0 0 -1 -3"/>
                    <path d="M9.7 17l4.6 0"/>
                </svg>
            </button>
            <button class="bar-btn" id="bar-loupe" type="button" data-state="off" title="Magnifier loupe" aria-label="Magnifier loupe">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"/>
                    <path d="M7 10l6 0"/>
                    <path d="M10 7l0 6"/>
                    <path d="M21 21l-6 -6"/>
                </svg>
            </button>
            <div class="bar-sep"></div>
            <!-- TODO(presenter-bar): replace with an inline proximity-chat panel + reactions once
                 the protocol (DesktopPipState.chatMessages + send-chat/send-reaction) is wired.
                 Until then this jumps back to the WorkAdventure window. -->
            <button class="bar-btn" id="bar-back" type="button" title="Back to WorkAdventure" aria-label="Back to WorkAdventure">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M8 9h8"/>
                    <path d="M8 13h6"/>
                    <path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12z"/>
                </svg>
            </button>
        </div>
    </div>
    <script src="./renderer.js"></script>
</body>
</html>
