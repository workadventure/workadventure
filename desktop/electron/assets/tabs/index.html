<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>WorkAdventure tabs</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0a1422;
            --fg: #e8eef6;
            --fg-muted: #8497ab;
            --tab: rgba(255, 255, 255, 0.06);
            --tab-active: rgba(109, 93, 252, 0.28);
            --border: rgba(255, 255, 255, 0.08);
        }
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #bar {
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 6px;
            gap: 4px;
        }
        #tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        #tabs::-webkit-scrollbar { display: none; }
        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 200px;
            min-width: 90px;
            height: 28px;
            padding: 0 6px 0 11px;
            background: var(--tab);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            flex: 0 1 auto;
        }
        .tab.active {
            background: var(--tab-active);
            border-color: rgba(169, 160, 255, 0.28);
        }
        .tab:hover:not(.active) { background: rgba(255, 255, 255, 0.11); }
        .tab-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }
        .tab-close {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border: 0;
            border-radius: 5px;
            background: none;
            color: var(--fg-muted);
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            padding: 0;
        }
        .tab-close:hover { background: rgba(255, 255, 255, 0.16); color: var(--fg); }
        #new-tab {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 0;
            border-radius: 8px;
            background: none;
            color: var(--fg-muted);
            cursor: pointer;
            font-size: 19px;
            line-height: 1;
        }
        #new-tab:hover { background: rgba(255, 255, 255, 0.11); color: var(--fg); }
    </style>
</head>
<body>
    <div id="bar">
        <div id="tabs"></div>
        <button id="new-tab" type="button" title="New world tab" aria-label="New world tab">+</button>
    </div>
    <script src="./renderer.js"></script>
</body>
</html>
